version: "2"

formatters:
  enable:
    - gofmt

linters:
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*net/http.Response).Body.Close
        - (*os.File).Close
        # CloseHandle failure is not actionable — we're already exiting the
        # scope (`defer`) and the handle is about to be unreachable anyway.
        - syscall.CloseHandle
