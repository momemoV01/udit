name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          VERSION="${GITHUB_REF_NAME}"
          go build -ldflags="-s -w -X main.Version=${VERSION}" -o "udit-${GOOS}-${GOARCH}${EXT}" .

      - uses: actions/upload-artifact@v7
        with:
          name: udit-${{ matrix.goos }}-${{ matrix.goarch }}
          path: udit-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Must stay at the same major as upload-artifact above — the two
      # actions exchange artifacts via an API that changed across major
      # versions. Dependabot's `artifact-actions` group in
      # .github/dependabot.yml keeps them bumped as a pair.
      - uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: udit-*
