version: 2

# Dependabot keeps our supply chain fresh so we don't have to pin third-
# party GitHub Actions by commit SHA. Both the Go modules and the
# workflow `uses:` references get a PR when a newer version lands.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    # upload-artifact and download-artifact must ship as a pair — the
    # API between them changed across major versions, so mixing majors
    # breaks the release workflow. Upstream releases the two actions on
    # independent cadences (e.g. download@v8 shipped while upload was
    # still at v7), so we block their automatic major bumps entirely
    # and bump the pair by hand when both upstream majors exist.
    # The `artifact-actions` group still bundles minor / patch bumps.
    ignore:
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/download-artifact"
        update-types: ["version-update:semver-major"]
    groups:
      artifact-actions:
        patterns:
          - "actions/upload-artifact"
          - "actions/download-artifact"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
