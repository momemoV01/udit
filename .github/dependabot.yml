version: 2

# Dependabot keeps our supply chain fresh so we don't have to pin third-
# party GitHub Actions by commit SHA. Both the Go modules and the
# workflow `uses:` references get a PR when a newer version lands.
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    groups:
      # upload-artifact and download-artifact must ship as a pair
      # (the API between them changed across major versions, so
      # mixing majors breaks the release workflow). Bundling them
      # into one PR means Dependabot waits for both upstream majors
      # to exist before the bump lands.
      artifact-actions:
        patterns:
          - "actions/upload-artifact"
          - "actions/download-artifact"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
